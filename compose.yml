# Production — single VM (backend + frontend + game + Traefik + Postgres)
#
#   cp .env.example .env
#   __init__/start-fast-game-prod.bat
#
# 1. Set DOMAIN below (e.g. example.com) and x-prod-app-config URLs/CORS.
# 2. Point DNS A records at the VM public IP (CDN optional — origin is the VM):
#
#      Host          Type    Points to
#      ------------  ------  ---------
#      @             A       <VM IP>     → https://example.com (frontend)
#      api           A       <VM IP>     → https://api.example.com (backend)
#      game          A       <VM IP>     → wss://game.example.com or game.example.com:2567
#      adminer       A       <VM IP>     → https://adminer.example.com (optional)
#
# 3. docker network create traefik-public   (once per VM)

name: fast-game

include:
  - compose.traefik.yml

x-backend-image: &backend-image
  image: fast-game-backend:prod

x-prod-app-config: &prod-app-config
  DOMAIN: example.com
  ENVIRONMENT: production
  PROJECT_NAME: fast-game
  FRONTEND_HOST: https://example.com
  GAME_SERVER_URL: wss://game.example.com
  BACKEND_CORS_ORIGINS: https://example.com,https://api.example.com,https://game.example.com

services:
  db:
    image: postgres:18
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
      POSTGRES_USER: ${POSTGRES_USER?Variable not set}
      POSTGRES_DB: ${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.fast-game-adminer.loadbalancer.server.port=8080
      - traefik.http.routers.fast-game-adminer-http.rule=Host(`adminer.${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-adminer-http.entrypoints=http
      - traefik.http.routers.fast-game-adminer-http.middlewares=https-redirect
      - traefik.http.routers.fast-game-adminer-https.rule=Host(`adminer.${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-adminer-https.entrypoints=https
      - traefik.http.routers.fast-game-adminer-https.tls.certresolver=le

  prestart:
    <<: *backend-image
    restart: "no"
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command: bash scripts/prestart.sh
    environment:
      <<: *prod-app-config
      SECRET_KEY: ${SECRET_KEY?Variable not set}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER?Variable not set}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD?Variable not set}
      POSTGRES_SERVER: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER?Variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
      SENTRY_DSN: ${SENTRY_DSN}

  backend:
    <<: *backend-image
    restart: always
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.fast-game-backend.loadbalancer.server.port=8000
      - traefik.http.routers.fast-game-backend-http.rule=Host(`api.${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-backend-http.entrypoints=http
      - traefik.http.routers.fast-game-backend-http.middlewares=https-redirect
      - traefik.http.routers.fast-game-backend-https.rule=Host(`api.${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-backend-https.entrypoints=https
      - traefik.http.routers.fast-game-backend-https.tls.certresolver=le
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/utils/health-check/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      <<: *prod-app-config
      SECRET_KEY: ${SECRET_KEY?Variable not set}
      FIRST_SUPERUSER: ${FIRST_SUPERUSER?Variable not set}
      FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD?Variable not set}
      POSTGRES_SERVER: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER?Variable not set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Variable not set}
      SENTRY_DSN: ${SENTRY_DSN}

  game:
    image: fast-game-colyseus:prod
    restart: always
    build:
      context: ./game
      dockerfile: Dockerfile
      target: production
    environment:
      NODE_ENV: production
      PORT: "2567"
    ports:
      - "2567:2567"
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.fast-game-game.loadbalancer.server.port=2567
      - traefik.http.routers.fast-game-game-http.rule=Host(`game.${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-game-http.entrypoints=http
      - traefik.http.routers.fast-game-game-http.middlewares=https-redirect
      - traefik.http.routers.fast-game-game-https.rule=Host(`game.${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-game-https.entrypoints=https
      - traefik.http.routers.fast-game-game-https.tls.certresolver=le

  frontend:
    image: fast-game-frontend:prod
    restart: always
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        PUBLIC_API_BASE_URL: https://api.${DOMAIN:-example.com}/api/v1
        PUBLIC_GAME_SERVER_URL: wss://game.${DOMAIN:-example.com}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
      - default
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.fast-game-frontend.loadbalancer.server.port=5000
      - traefik.http.routers.fast-game-frontend-http.rule=Host(`${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-frontend-http.entrypoints=http
      - traefik.http.routers.fast-game-frontend-http.middlewares=https-redirect
      - traefik.http.routers.fast-game-frontend-https.rule=Host(`${DOMAIN:-example.com}`)
      - traefik.http.routers.fast-game-frontend-https.entrypoints=https
      - traefik.http.routers.fast-game-frontend-https.tls.certresolver=le

volumes:
  db-data:

networks:
  traefik-public:
    name: traefik-public
    external: true
