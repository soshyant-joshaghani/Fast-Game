# Dev routes — host processes (Vite + uvicorn + Colyseus) and TLS for *.localhost.

http:
  routers:
    fast-game-backend-host:
      rule: Host(`api.localhost`)
      entryPoints:
        - http
        - https
      service: fast-game-backend-host
    fast-game-frontend-host:
      rule: Host(`dashboard.localhost`)
      entryPoints:
        - http
        - https
      service: fast-game-frontend-host
    fast-game-game-host:
      rule: Host(`game.localhost`)
      entryPoints:
        - http
        - https
      service: fast-game-game-host

  services:
    fast-game-backend-host:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8000
    fast-game-frontend-host:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:5173
    fast-game-game-host:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:2567

tls:
  stores:
    default:
      defaultGeneratedCert:
        resolver: default
        domain:
          main: localhost
          sans:
            - "*.localhost"
